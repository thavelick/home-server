# Loads default set of integrations. Do not remove.
default_config:

# Load frontend themes from the themes folder
frontend:
  themes: !include_dir_merge_named themes

automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml

homeassistant:
  external_url: https://assistant.tristanhavelick.com
  internal_url: http://192.168.1.192:8123

google_assistant:
  project_id: ha-tristanhavelick-gh
  service_account: !include SERVICE_ACCOUNT.json
  report_state: true
  exposed_domains:
    - switch
    - light
  entity_config:
    light.kauf_bulb_302ddd_kauf_bulb_cold_rgb:
      expose: false

rest_command:
  roku_find_remote:
    url: "http://192.168.1.141:8060/keypress/FindRemote"
    method: POST

template:
  - sensor:
      - name: "Pixel 10a Battery Drain Cumulative"
        unit_of_measurement: "%"
        state_class: total_increasing
        state: >
          {% set current = states('sensor.pixel_10a_battery_level') | float(0) %}
          {% set previous = this.attributes.get('last_level', current) %}
          {% set drain = previous - current if current < previous else 0 %}
          {% set total = this.state | float(0) + drain %}
          {{ total }}
        attributes:
          last_level: "{{ states('sensor.pixel_10a_battery_level') | float(0) }}"

http:
  trusted_proxies:
    - 127.0.0.1
    - "::1"
    - 192.168.1.126
    - 172.17.0.1
  use_x_forwarded_for: true
  ip_ban_enabled: false
  login_attempts_threshold: -1
