- id: '1770580100000'
  alias: Phone Charger - Periodic Power Check
  description: Turn off charger when power draw is low (battery mostly full)
  triggers:
  - minutes: /30
    trigger: time_pattern
  conditions:
  - condition: time
    after: '11:00:00'
    before: 07:00:00
  actions:
  - target:
      entity_id: switch.kauf_plug_d672d1_kauf_plug
    action: switch.turn_on
  - delay: 00:05:00
  - choose:
    - conditions:
      - condition: numeric_state
        entity_id: sensor.kauf_plug_d672d1_kauf_plug_power
        below: 5
      sequence:
      - target:
          entity_id: switch.kauf_plug_d672d1_kauf_plug
        action: switch.turn_off
  mode: single
