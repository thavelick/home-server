---
- name: make the backup staging and repository directories
  file:
    path: "{{item}}"
    state: directory
    owner: root
    group: root
    mode: 0755
  loop:
    - "{{backup_staging_directory}}"
    - "{{borg_backup_directory}}"
- name: copy the pre-backup script
  template:
    src: files/prebackup.sh
    dest: "/root/prebackup.sh"
    owner: root
    group: root
    mode: 0755
- name: set up a cron to run the prebackup script hourly, on the half hour
  cron:
    name: pre-backup
    minute: "30"
    hour: "*"
    job: >-
      /root/prebackup.sh {{backup_staging_directory}}
      wallabag={{wallabag_site_root}}/wallabag.db
      nextcloud={{nextcloud_data_directory}}/nextcloud.db
      jellyfin_library={{jellyfin_data_directory}}/data/library.db
      jellyfin={{jellyfin_data_directory}}/data/jellyfin.db
      radarr={{radarr_config_directory}}/radarr.db
      prowlarr={{prowlarr_config_directory}}/prowlarr.db
      readarr={{readarr_config_directory}}/readarr.db
      jellyseerr={{jellyseerr_config_directory}}/db/db.sqlite3
      uptime_kuma={{uptime_kuma_data_directory}}/kuma.db
- name: set up to backup folders locally with borg
  include_role: {name: borgbase.ansible_role_borgbackup}
  vars:
    borg_encryption_passphrase: "{{borg_passphrase}}"
    borg_repository: "{{borg_backup_directory}}"
    borg_source_directories:
      - "{{backup_staging_directory}}"
      - "{{nextcloud_data_directory}}"
      - "{{nextcloud_config_directory}}"
      - "{{tubesync_config_directory}}"
      - "{{home_assistant_config_directory}}"
      - "{{home_assistant_matter_data_directory}}"
      - "{{jellyfin_data_directory}}"
      - "{{jellyseerr_config_directory}}"
      - "{{letsencrypt_state_directory}}"
      - "{{prowlarr_config_directory}}"
      - "{{radarr_config_directory}}"
      - "{{readarr_config_directory}}"
      - "{{uptime_kuma_data_directory}}"
    borg_retention_policy:
      keep_hourly: 3
      keep_daily: 7
      keep_weekly: 4
      keep_monthly: 6
- name: initialize the repository
  command: borg init --encryption=repokey-blake2 {{borg_backup_directory}}
  environment:
    BORG_PASSPHRASE: "{{borg_passphrase}}"
  args:
    creates: "{{borg_backup_directory}}/config"
- name: install and configure rclone
  include_role: {name: stefangweichinger.ansible_rclone}
  vars:
    rclone_configs:
      - name: backblaze
        properties:
          type: b2
          account: "{{backblaze_account_id}}"
          key: "{{backblaze_application_key}}"
- name: set up a cron to send backups to backblaze daily at 10am
  cron:
    name: backup-to-backblaze
    minute: "0"
    hour: "10"
    job: "/usr/local/bin/rclone sync {{borg_backup_directory}} backblaze:{{backblaze_bucket_name}} --config /root/.config/rclone/rclone.conf"
