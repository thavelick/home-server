---
# Replaces the vharmers.jellyfin galaxy role, which used the apt_key module
# (the apt-key binary was removed in Debian 13/trixie). Set the key up the
# modern way: a dedicated keyring referenced via signed-by.
- name: ensure apt keyrings directory exists
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'
- name: install the jellyfin repo signing key
  get_url:
    url: https://repo.jellyfin.org/jellyfin_team.gpg.key
    dest: /etc/apt/keyrings/jellyfin.asc
    mode: '0644'
- name: remove legacy jellyfin repo lists (replaced by the deb822 .sources file)
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/apt/sources.list.d/repo_jellyfin_org_debian.list
    - /etc/apt/sources.list.d/jellyfin.list
- name: configure the jellyfin apt repo
  deb822_repository:
    name: jellyfin
    types: deb
    uris: https://repo.jellyfin.org/debian
    suites: "{{ ansible_distribution_release | lower }}"
    components: main
    architectures: amd64
    signed_by: /etc/apt/keyrings/jellyfin.asc
    state: present
- name: install jellyfin
  apt:
    name: jellyfin
    state: present
- name: configure nginx
  include_role: {name: nginx_standard}
  vars:
    domain: "{{jellyfin_domain}}"
    service_port: 8096
    nginx_conf_template: jellyfin_nginx.conf.j2
